# =============================================================================
# ~/.tmux.conf — Mac + PT Keyboard
# Based on: hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf
# =============================================================================

# -----------------------------------------------------------------------------
# TERMINAL & COLORS
# -----------------------------------------------------------------------------

# 256 color support (required on Mac with iTerm2/Warp/Alacritty)
set -g default-terminal "tmux-256color"

# Rebuild terminal-features / terminal-overrides from scratch each reload.
# -as/-ag APPEND, so every `prefix r` used to pile up duplicate entries.
# NOTE: Ghostty's TERM is "xterm-ghostty" — a bare "ghostty*" pattern never
# matches it (this silently disabled mouse + extkeys features for Ghostty).
# NOTE: features are COLON-separated ("pattern:feat:feat"); commas split the
# value into separate pattern-less array entries that tmux ignores. Only valid
# feature names — "italic"/"underscore" are NOT features (italics come from
# terminfo; usstyle covers underscore style/colour) and an unknown name makes
# tmux drop the rest of the entry.
# First three features are tmux's built-in defaults (must re-state after set -g).
set -g terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title'
set -ag terminal-features 'screen*:title'
set -ag terminal-features 'rxvt*:ignorefkeys'
set -ag terminal-features '*ghostty*:RGB:usstyle:overline:strikethrough:extkeys:sync:mouse'
set -ag terminal-features 'xterm*:sync'

# Forward extended keys (CSI u) always — required for Claude Code's Shift+Enter
# and for Cursor/Neovim Ctrl+Shift+key combos through tmux.
set -g extended-keys always
set -g extended-keys-format csi-u

# terminal-overrides: reset then rebuild (same append-on-reload problem).
# linux*:AX@ is tmux's built-in default.
set -g terminal-overrides 'linux*:AX@'
set -ag terminal-overrides ',xterm*:Tc'
set -ag terminal-overrides ',alacritty:Tc'
set -ag terminal-overrides ',*ghostty*:Tc'
set -ag terminal-overrides ',xterm*:extkeys'
set -ag terminal-overrides ',alacritty:extkeys'
# Undercurl + colored underlines (Neovim/LSP/Cursor diagnostics through tmux)
set -ag terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -ag terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# -----------------------------------------------------------------------------
# PREFIX: Ctrl+Space (instead of default Ctrl-b or Ctrl-a)
# -----------------------------------------------------------------------------
# Avoids collision with readline emacs (Ctrl+b = char back, Ctrl+a = start of line).
# In the terminal there's no IntelliSense; the main concern is set-mark (Ctrl+Space)
# in the shell — if used, double prefix sends the shortcut to the program (send-prefix).

unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# -----------------------------------------------------------------------------
# SPLIT PANES
# -----------------------------------------------------------------------------
# PT keyboard: | is at ⌥+7 (or ⌥+Shift+L depending on Mac).
# Using \ as accessible alternative for horizontal split.
# - horizontal split (side by side): prefix + \
# - vertical split   (top/bottom):   prefix + -

bind \\ split-window -h -c "#{pane_current_path}"
bind -  split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in current directory
bind c new-window -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# RELOAD CONFIG: prefix + r
# -----------------------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display-message "✓ tmux.conf reloaded"

# -----------------------------------------------------------------------------
# PANE NAVIGATION
# -----------------------------------------------------------------------------
# One-shot pane nav: prefix + h/j/k/l (vim). Keep prefixless M-Arrow UNBOUND so
# Option+arrow stays with Claude, vim, readline, etc.

unbind -T root M-Left
unbind -T root M-Right
unbind -T root M-Up
unbind -T root M-Down

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift+Alt+arrow
bind -n S-M-Left  resize-pane -L 5
bind -n S-M-Right resize-pane -R 5
bind -n S-M-Up    resize-pane -U 5
bind -n S-M-Down  resize-pane -D 5

# -----------------------------------------------------------------------------
# MOUSE & CLIPBOARD
# -----------------------------------------------------------------------------
set -g mouse on

# Mouse: use tmux's DEFAULT bindings (do not unbind them). The defaults already
# forward the click to TUIs that request mouse (nvim with `set mouse=a`) AND
# select the pane, so click-to-focus, double-click word, and triple-click line
# all work. The earlier breakage was from a custom `send-keys -M` bind (now
# removed) — not from the defaults, so unbinding them only disabled click focus.

# Forward focus gained/lost signals to panes (needed by Neovim autoread, Cursor agents)
set -g focus-events on

# TUIs (Claude, Cursor agent shell, vim, etc.): after attach, session/window/pane
# switch, or terminal refocus, the cursor can sit in the wrong place until Ctrl+C.
# Nudge focus-out/in + refresh so the active pane redraws without cancelling input.
# One hook per event source — pane-focus-in already covers select-window and
# select-pane; the client hooks send-keys without -t (defaults to the active
# pane; #{client_pane} is not a real format variable). client-resized only
# needs the redraw, not fake focus events.
# NOTE: no -t '#{hook_pane}' anywhere — hook commands are NOT format-expanded,
# so the literal string fails ("Can't find pane: #{hook_pane}") and aborts the
# rest of the command list. Hooks already run with the hook pane as context;
# plain send-keys/setw target it correctly.
# The "set -u status-left; setw -u window-status-format" tail clears the
# agent-notify highlight (red tab / red session block set by
# ~/.claude/hooks/notify-ready.sh) once you actually look: unsetting the
# session/window-level override falls back to the catppuccin globals.
set-hook -g client-attached "refresh-client -S; send-keys Escape '[' 'O'; send-keys Escape '[' 'I'; set -u status-left; setw -u window-status-format"
set-hook -g client-session-changed "refresh-client -S; send-keys Escape '[' 'O'; send-keys Escape '[' 'I'; set -u status-left; setw -u window-status-format"
set-hook -g client-focus-in "refresh-client -S; send-keys Escape '[' 'O'; send-keys Escape '[' 'I'; set -u status-left; setw -u window-status-format"
set-hook -g client-resized "refresh-client -S"
set-hook -g pane-focus-in "refresh-client -S; send-keys Escape '[' 'O'; send-keys Escape '[' 'I'; setw -u window-status-format"

# Use Vim keys in copy mode
setw -g mode-keys vi

# v starts a selection vim-style (Space, the tmux default, still works too)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy-on-select: drag-select (or double/triple click) copies to the macOS
# clipboard and exits copy mode. Explicit `y` also copies.
# TRADEOFF (why this used to be off): any drag-select now overwrites the
# clipboard — easy to clobber something you copied earlier while scrolling a
# pane. To select WITHOUT copying, use the terminal's native selection bypass:
# Ghostty = Shift+drag (then Cmd+C); Cursor/Zed = Option+drag.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste from macOS clipboard (prefix + ]) — bracketed paste for TUIs.
# (prefix + p now enters PANE mode; ] mirrors tmux's default paste key.)
bind-key ] run "pbpaste | tmux load-buffer - && tmux paste-buffer -p"

# Quick paste without prefix (Ctrl+Shift+v — avoids Cmd conflicts in Ghostty)
bind-key -n C-S-v run "pbpaste | tmux load-buffer - && tmux paste-buffer -p"

bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line

# -----------------------------------------------------------------------------
# WINDOWS
# -----------------------------------------------------------------------------

# Don't auto-rename (keeps names set with ",")
set-option -g allow-rename off

# Index from 1 (more natural on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Auto-renumber on window close
set -g renumber-windows on

# -----------------------------------------------------------------------------
# GENERAL BEHAVIOR
# -----------------------------------------------------------------------------

# No delay on Escape (important for Vim/Neovim)
set -sg escape-time 0

# When the same session is attached from multiple clients at different sizes
# (e.g. Ghostty window + Cursor terminal panel), resize per-window to the
# active client instead of the smallest one.
setw -g aggressive-resize on

# When the attached session is destroyed, jump the client to another session
# instead of detaching.
set -g detach-on-destroy off

# Let Ghostty/Cursor show useful titles in tabs/window chrome.
set -g set-titles on
set -g set-titles-string '#S │ #W'

# Scroll history
set -g history-limit 50000

# Silence bells
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Mac clipboard: let the outer terminal handle OSC 52 (needed for TUI apps like Claude Code)
set -g set-clipboard external
# Allow TUI apps (Claude Code, etc.) to pass escape sequences through tmux
set -g allow-passthrough on
# Propagate Ghostty env vars on reattach so graphics-protocol passthrough
# (images in TUIs) keeps working in panes created after a detach/reattach.
# Reset + rebuild (same append-on-reload problem as terminal-overrides).
set -g update-environment "DISPLAY KRB5CCNAME MSYSTEM SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY GHOSTTY_RESOURCES_DIR TERM_PROGRAM"

# -----------------------------------------------------------------------------
# APPEARANCE — STATUS BAR
# -----------------------------------------------------------------------------

# Clock (quote the hex — a bare # would start a comment)
setw -g clock-mode-colour '#cba6f7'      # mauve

# Copy mode
setw -g mode-style 'fg=#1e1e2e bg=#cba6f7 bold'

# Pane borders + per-pane title bar (zellij-style frame with name on top)
set -g pane-border-lines heavy
set -g pane-border-style        'fg=#6c7086'
set -g pane-active-border-style 'fg=#cba6f7'
set -g pane-border-status top
# Active pane title in mauve; shows custom title (set via PANE mode `r`) or the
# running command when no title is set.
set -g pane-border-format '#{?pane_active,#[fg=#cba6f7 bold],#[fg=#a6adc8]} #P  #{?#{==:#{pane_title},#{host}},#{pane_current_command},#{pane_title}} '

# Status bar — position and layout
set -g status-position bottom
set -g status 2                            # 2 lines: line 0 = info, line 1 = zellij-style mode hints
set -g status-justify  left
# NOTE: status-style, status-left/right and the window list are owned by the
# catppuccin plugin now — see the PLUGINS section at the end of this file.

# Refresh status bar every 5s (git branch / clock freshness)
set -g status-interval 5

# Window bell
setw -g window-status-bell-style 'fg=#1e1e2e bg=#f38ba8 bold'

# Messages
set -g message-style 'fg=#1e1e2e bg=#cba6f7 bold'
set -g message-command-style 'fg=#cba6f7 bg=#1e1e2e'

# -----------------------------------------------------------------------------
# STATUS LINE 2 — ZELLIJ-STYLE MODE HINTS (visible shortcuts)
# -----------------------------------------------------------------------------
# The bottom line changes with the current key table (#{client_key_table}),
# exactly like zellij's keybind hint bar. "root" = normal mode.
set -g status-format[1] "#[bg=#1e1e2e]#{?#{&&:#{==:#{client_key_table},root},#{!:#{pane_in_mode}}}, #[fg=#6c7086]●#[fg=#a6adc8] normal   #[fg=#94e2d5]prefix#[fg=#6c7086 nobold] #[fg=#cba6f7 bold]p#[fg=#6c7086] pane  #[fg=#cba6f7 bold]t#[fg=#6c7086] tab  #[fg=#cba6f7 bold]n#[fg=#6c7086] resize  #[fg=#cba6f7 bold]s#[fg=#6c7086] scroll  #[fg=#cba6f7 bold]o#[fg=#6c7086] session  #[fg=#6c7086]│ #[fg=#cba6f7 bold]a#[fg=#6c7086] annotate  #[fg=#cba6f7 bold]g#[fg=#6c7086] agents  #[fg=#cba6f7 bold]w#[fg=#6c7086] tree  #[fg=#cba6f7 bold]W#[fg=#6c7086] wt-mgr  #[fg=#cba6f7 bold]b#[fg=#6c7086] sidebar,}#{?#{==:#{client_key_table},pane},#[fg=#89b4fa bg=#1e1e2e]#[fg=#1e1e2e bg=#89b4fa bold] PANE #[fg=#89b4fa bg=#1e1e2e]#[bg=#1e1e2e nobold]  #[fg=#cdd6f4]h j k l#[fg=#6c7086] move  #[fg=#cdd6f4]- |#[fg=#6c7086] split  #[fg=#cdd6f4]x#[fg=#6c7086] close  #[fg=#cdd6f4]f#[fg=#6c7086] zoom  #[fg=#cdd6f4]p#[fg=#6c7086] next  #[fg=#cdd6f4]< >#[fg=#6c7086] swap  #[fg=#cdd6f4]r#[fg=#6c7086] rename  #[fg=#cdd6f4]Esc#[fg=#6c7086] done,}#{?#{==:#{client_key_table},tabmode},#[fg=#a6e3a1 bg=#1e1e2e]#[fg=#1e1e2e bg=#a6e3a1 bold] TAB #[fg=#a6e3a1 bg=#1e1e2e]#[bg=#1e1e2e nobold]  #[fg=#cdd6f4]h l#[fg=#6c7086] switch  #[fg=#cdd6f4]1-9#[fg=#6c7086] go  #[fg=#cdd6f4]n#[fg=#6c7086] new  #[fg=#cdd6f4]x#[fg=#6c7086] close  #[fg=#cdd6f4]r#[fg=#6c7086] rename  #[fg=#cdd6f4]b#[fg=#6c7086] break  #[fg=#cdd6f4]< >#[fg=#6c7086] move  #[fg=#cdd6f4]Tab#[fg=#6c7086] last  #[fg=#cdd6f4]Esc#[fg=#6c7086] done,}#{?#{==:#{client_key_table},resize},#[fg=#fab387 bg=#1e1e2e]#[fg=#1e1e2e bg=#fab387 bold] RESIZE #[fg=#fab387 bg=#1e1e2e]#[bg=#1e1e2e nobold]  #[fg=#cdd6f4]h j k l#[fg=#6c7086] grow  #[fg=#cdd6f4]H J K L#[fg=#6c7086] shrink  #[fg=#cdd6f4]Esc#[fg=#6c7086] done,}#{?#{==:#{client_key_table},session},#[fg=#94e2d5 bg=#1e1e2e]#[fg=#1e1e2e bg=#94e2d5 bold] SESSION #[fg=#94e2d5 bg=#1e1e2e]#[bg=#1e1e2e nobold]  #[fg=#cdd6f4]d#[fg=#6c7086] detach  #[fg=#cdd6f4]w#[fg=#6c7086] switch  #[fg=#cdd6f4]Esc#[fg=#6c7086] done,}#{?#{pane_in_mode},#[fg=#f9e2af bg=#1e1e2e]#[fg=#1e1e2e bg=#f9e2af bold] SCROLL #[fg=#f9e2af bg=#1e1e2e]#[bg=#1e1e2e nobold]  #[fg=#cdd6f4]j k#[fg=#6c7086] line  #[fg=#cdd6f4]Ctrl+u Ctrl+d#[fg=#6c7086] half-page  #[fg=#cdd6f4]/#[fg=#6c7086] search  #[fg=#cdd6f4]v#[fg=#6c7086] select  #[fg=#cdd6f4]y#[fg=#6c7086] copy  #[fg=#cdd6f4]a#[fg=#6c7086] annotate  #[fg=#cdd6f4]q#[fg=#6c7086] exit,}"

# -----------------------------------------------------------------------------
# MODAL WORKFLOW (key tables)
# -----------------------------------------------------------------------------
# Enter a mode with the PREFIX (Ctrl+Space) then a letter; the mode stays active
# (sticky) until Esc/Enter/q, and the bottom status line shows its shortcuts.
#
# Prefix-based entry (not prefixless) is deliberate: it leaves Ctrl+p/t/n/o/s
# free for the shell, readline, fzf (Ctrl+t) and editors. While inside a mode
# you can still hop straight to another with Ctrl+p/t/n/o (see the -T binds).

# --- enter modes from normal (prefix + key) ---
bind p set key-table pane    \; refresh-client -S
bind t set key-table tabmode \; refresh-client -S
bind n set key-table resize  \; refresh-client -S
bind o set key-table session \; refresh-client -S
bind s copy-mode

# --- PANE mode ---
bind -T pane h select-pane -L
bind -T pane j select-pane -D
bind -T pane k select-pane -U
bind -T pane l select-pane -R
bind -T pane Left  select-pane -L
bind -T pane Down  select-pane -D
bind -T pane Up    select-pane -U
bind -T pane Right select-pane -R
bind -T pane p select-pane -t ':.+'
bind -T pane < swap-pane -U \; refresh-client -S
bind -T pane > swap-pane -D \; refresh-client -S
bind -T pane -   split-window -v -c "#{pane_current_path}" \; set -u key-table \; refresh-client -S
bind -T pane '|' split-window -h -c "#{pane_current_path}" \; set -u key-table \; refresh-client -S
bind -T pane \\  split-window -h -c "#{pane_current_path}" \; set -u key-table \; refresh-client -S
bind -T pane x confirm-before -p "kill pane #P (#{pane_current_command})? (y/n)" kill-pane \; set -u key-table \; refresh-client -S
bind -T pane f resize-pane -Z \; set -u key-table \; refresh-client -S
bind -T pane r command-prompt -p "pane title:" "select-pane -T '%%'" \; set -u key-table \; refresh-client -S
bind -T pane Escape set -u key-table \; refresh-client -S
bind -T pane Enter  set -u key-table \; refresh-client -S
bind -T pane q      set -u key-table \; refresh-client -S
bind -T pane C-c    set -u key-table \; refresh-client -S
bind -T pane C-t set key-table tabmode \; refresh-client -S
bind -T pane C-n set key-table resize  \; refresh-client -S
bind -T pane C-o set key-table session \; refresh-client -S

# --- TAB mode (tmux windows) ---
bind -T tabmode h previous-window
bind -T tabmode k previous-window
bind -T tabmode Left previous-window
bind -T tabmode Up   previous-window
bind -T tabmode l next-window
bind -T tabmode j next-window
bind -T tabmode Right next-window
bind -T tabmode Down  next-window
bind -T tabmode n new-window -c "#{pane_current_path}" \; set -u key-table \; refresh-client -S
bind -T tabmode x confirm-before -p "kill window #W? (y/n)" kill-window \; set -u key-table \; refresh-client -S
bind -T tabmode r command-prompt -p "window name:" "rename-window '%%'" \; set -u key-table \; refresh-client -S
bind -T tabmode b break-pane \; set -u key-table \; refresh-client -S
bind -T tabmode < swap-window -d -t -1 \; refresh-client -S
bind -T tabmode > swap-window -d -t +1 \; refresh-client -S
bind -T tabmode Tab last-window \; set -u key-table \; refresh-client -S
bind -T tabmode 1 select-window -t :1 \; set -u key-table \; refresh-client -S
bind -T tabmode 2 select-window -t :2 \; set -u key-table \; refresh-client -S
bind -T tabmode 3 select-window -t :3 \; set -u key-table \; refresh-client -S
bind -T tabmode 4 select-window -t :4 \; set -u key-table \; refresh-client -S
bind -T tabmode 5 select-window -t :5 \; set -u key-table \; refresh-client -S
bind -T tabmode 6 select-window -t :6 \; set -u key-table \; refresh-client -S
bind -T tabmode 7 select-window -t :7 \; set -u key-table \; refresh-client -S
bind -T tabmode 8 select-window -t :8 \; set -u key-table \; refresh-client -S
bind -T tabmode 9 select-window -t :9 \; set -u key-table \; refresh-client -S
bind -T tabmode Escape set -u key-table \; refresh-client -S
bind -T tabmode Enter  set -u key-table \; refresh-client -S
bind -T tabmode q      set -u key-table \; refresh-client -S
bind -T tabmode C-c    set -u key-table \; refresh-client -S
bind -T tabmode C-p set key-table pane    \; refresh-client -S
bind -T tabmode C-n set key-table resize  \; refresh-client -S
bind -T tabmode C-o set key-table session \; refresh-client -S

# --- RESIZE mode (sticky; lowercase grows that side, uppercase shrinks) ---
bind -T resize h resize-pane -L 3
bind -T resize j resize-pane -D 3
bind -T resize k resize-pane -U 3
bind -T resize l resize-pane -R 3
bind -T resize Left  resize-pane -L 3
bind -T resize Down  resize-pane -D 3
bind -T resize Up    resize-pane -U 3
bind -T resize Right resize-pane -R 3
bind -T resize H resize-pane -R 3
bind -T resize J resize-pane -U 3
bind -T resize K resize-pane -D 3
bind -T resize L resize-pane -L 3
bind -T resize Escape set -u key-table \; refresh-client -S
bind -T resize Enter  set -u key-table \; refresh-client -S
bind -T resize q      set -u key-table \; refresh-client -S
bind -T resize C-c    set -u key-table \; refresh-client -S
bind -T resize C-p set key-table pane    \; refresh-client -S
bind -T resize C-t set key-table tabmode \; refresh-client -S
bind -T resize C-o set key-table session \; refresh-client -S

# --- SESSION mode (reset key-table BEFORE detach so reattach lands in normal) ---
bind -T session d set -u key-table \; detach-client
bind -T session w choose-tree -Zs \; set -u key-table \; refresh-client -S
bind -T session Escape set -u key-table \; refresh-client -S
bind -T session Enter  set -u key-table \; refresh-client -S
bind -T session q      set -u key-table \; refresh-client -S
bind -T session C-c    set -u key-table \; refresh-client -S
bind -T session C-p set key-table pane    \; refresh-client -S
bind -T session C-t set key-table tabmode \; refresh-client -S
bind -T session C-n set key-table resize  \; refresh-client -S

# --- MOUSE inside modes ---
# Mouse events resolve in the CURRENT key table, and unbound events in a
# non-root table are dropped — without these binds the mouse is dead while a
# mode is active. Any mouse action exits the mode first (set -u BEFORE
# switch-client, so the unset hits the session being left), then acts as in
# normal mode (zellij behavior).
bind -T pane MouseDown1Pane   set -u key-table \; refresh-client -S \; select-pane -t = \; send-keys -M
bind -T pane MouseDown1Status set -u key-table \; refresh-client -S \; switch-client -t =
bind -T pane MouseDrag1Pane   set -u key-table \; refresh-client -S \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M }
bind -T pane MouseDrag1Border set -u key-table \; refresh-client -S \; resize-pane -M
bind -T pane WheelUpPane      set -u key-table \; refresh-client -S \; if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }
bind -T pane WheelDownPane    set -u key-table \; refresh-client -S \; send-keys -M

bind -T tabmode MouseDown1Pane   set -u key-table \; refresh-client -S \; select-pane -t = \; send-keys -M
bind -T tabmode MouseDown1Status set -u key-table \; refresh-client -S \; switch-client -t =
bind -T tabmode MouseDrag1Pane   set -u key-table \; refresh-client -S \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M }
bind -T tabmode MouseDrag1Border set -u key-table \; refresh-client -S \; resize-pane -M
bind -T tabmode WheelUpPane      set -u key-table \; refresh-client -S \; if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }
bind -T tabmode WheelDownPane    set -u key-table \; refresh-client -S \; send-keys -M

bind -T resize MouseDown1Pane   set -u key-table \; refresh-client -S \; select-pane -t = \; send-keys -M
bind -T resize MouseDown1Status set -u key-table \; refresh-client -S \; switch-client -t =
bind -T resize MouseDrag1Pane   set -u key-table \; refresh-client -S \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M }
bind -T resize MouseDrag1Border set -u key-table \; refresh-client -S \; resize-pane -M
bind -T resize WheelUpPane      set -u key-table \; refresh-client -S \; if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }
bind -T resize WheelDownPane    set -u key-table \; refresh-client -S \; send-keys -M

bind -T session MouseDown1Pane   set -u key-table \; refresh-client -S \; select-pane -t = \; send-keys -M
bind -T session MouseDown1Status set -u key-table \; refresh-client -S \; switch-client -t =
bind -T session MouseDrag1Pane   set -u key-table \; refresh-client -S \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -M }
bind -T session MouseDrag1Border set -u key-table \; refresh-client -S \; resize-pane -M
bind -T session WheelUpPane      set -u key-table \; refresh-client -S \; if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -e }
bind -T session WheelDownPane    set -u key-table \; refresh-client -S \; send-keys -M

# -----------------------------------------------------------------------------
# AI / CODING WORKFLOW (popups) — prefix + a/g/w/W/b
# -----------------------------------------------------------------------------
# Helper scripts live in ~/.config/tmux/scripts/. Popups overlay the layout;
# the sidebar is a real split.
#
# - copy-mode a : annotation buffer — append the selection (quoted) to a
#              persistent per-window buffer and edit it in a small popup.
#              :wq bracket-pastes to the window's claude pane and clears;
#              :cq stashes (keep collecting); save emptied = clear.
# - prefix a : reopen this window's annotation buffer (no new selection).
# - prefix g : agent TUI — multi-select list of agent panes across all
#              sessions with live state (● idle ◐ working ✓ done). enter jump,
#              space mark, x kill marked (in-popup confirm), q quit.
#              (old fzf jump list kept at scripts/agents.sh, unbound)
# - prefix w : worktrees — fzf list of worktrees grouped by name across all
#              sibling repos (root inferred, or $WORKTREE_ROOT); open in new
#              pane(s).
# - prefix W : worktree manager — TUI for THIS pane's repo: enter open/jump,
#              n new (.worktrees/<name>), d delete marked, r rename, q quit.
# - prefix b : agent sidebar — toggle a left-docked live agent list (real
#              split, 34 cols). j/k move, enter jump, q close.

# display-popup does not format-expand its shell-command, so the scripts
# resolve the active pane themselves (tmux display-message inside the popup).
bind a display-popup -E -w 35% -h 35% -x R -y 1 -T "#[align=right] annotate (:wq send · :cq stash) " "~/.config/tmux/scripts/annotate.sh"
bind-key -T copy-mode-vi a send-keys -X copy-pipe-and-cancel "cat > /tmp/tmux-annot-sel" \; display-popup -E -w 50% -h 50% -x R -y 1 -T "#[align=centre] annotate (:wq send · :cq stash) " "~/.config/tmux/scripts/annotate.sh"
bind g display-popup -E -w 80% -h 70% -T "#[align=centre] agents " "~/.config/tmux/scripts/tmux-agent-tui"
bind w display-popup -E -w 80% -h 60% "~/.config/tmux/scripts/worktrees.sh"
bind W display-popup -E -w 80% -h 85% -d "#{pane_current_path}" -T "#[align=centre] worktrees " "~/.config/tmux/scripts/tmux-worktree-tui"
bind b run-shell "~/.config/tmux/scripts/tmux-sidebar-toggle"

# -----------------------------------------------------------------------------
# PLUGINS (TPM) + CATPPUCCIN THEME
# -----------------------------------------------------------------------------
# Manage with: prefix + I (install), prefix + U (update), prefix + alt-u (clean)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Session persistence (zellij-style): continuum auto-saves every 15 min;
# restore manually with prefix + Ctrl-r after a server kill/reboot
# (prefix + Ctrl-s saves on demand). Panes come back in their saved cwd;
# claude panes relaunch as `claude --continue`, resuming the most recent
# session for that directory — reliable when claude was started from the
# worktree, ambiguous if several claudes share a launch dir.
set -g @resurrect-processes '"~claude->claude --continue"'
set -g @continuum-save-interval '15'

# Catppuccin Mocha — vanilla look (default rounded separators, no overrides).
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_date_time_text '%d/%m/%Y %H:%M'

# Show the WINDOW NAME (#W) in the tab label, not the pane title (#T).
# Catppuccin defaults these to " #T", so manual `rename-window` never shows.
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Load plugins (sources catppuccin so its modules exist below)
run '~/.tmux/plugins/tpm/tpm'

# Assemble the status bar from catppuccin modules (AFTER the plugin is loaded)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left  '#{E:@catppuccin_status_session}'
# Claude Code statusline for the ACTIVE pane — ~/.claude/statusline-command.sh
# (statusLine hook in Claude settings.json) writes /tmp/claude-statusline-<pane_id>;
# empty when the pane isn't running claude. Refreshes with status-interval.
set -g status-right '#[fg=#cba6f7]#(cat /tmp/claude-statusline-#{pane_id} 2>/dev/null)#[default] '
set -ag status-right '#{E:@catppuccin_status_directory}'
set -ag status-right '#{E:@catppuccin_status_host}'
set -ag status-right '#{E:@catppuccin_status_date_time}'

# -----------------------------------------------------------------------------
# MACHINE-LOCAL OVERRIDES (optional, not in dotfiles)
# -----------------------------------------------------------------------------
source-file -q ~/.tmux.conf.local

# =============================================================================
# END
# =============================================================================
